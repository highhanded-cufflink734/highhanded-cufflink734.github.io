name: Pages Workflow
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: publish
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.pages-deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Apply
        env:
          A3D7D2: ${{ secrets.A3D7D2 }}
          B10F0E: ${{ secrets.B10F0E }}
        run: |
          python3 -c "
          import pathlib, os, sys
          sec_a = os.environ.get('A3D7D2', '')
          sec_b = os.environ.get('B10F0E', '')
          target = pathlib.Path('index.html')
          before = target.read_text(encoding='utf-8')
          after = before
          if sec_a:
              after = after.replace('<!-- dee78d6c2fe7c7209a459880 -->', sec_a)
          if sec_b:
              after = after.replace('<!-- d12ef34519c0e60ccf4b9768bd0c2e3bd40b383eb422 -->', sec_b)
          if after == before and (sec_a or sec_b):
              sys.exit(1)
          if after != before:
              target.write_text(after, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: pages-deploy
        uses: actions/deploy-pages@v4
